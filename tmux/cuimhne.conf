# cuimhne tmux theme
# bg0=#1A1714  bg1=#242019  bg2=#2E2921  bg3=#332E27  bg4=#3D3830
# fg0=#F0EBE1  fg1=#D4CEC6  fg2=#9C9488  fg3=#6B6560
# green=#7FA688  sage=#A8B898  gold=#C4A882  terra=#C47A5A  mist=#8FA89C

# --- status bar ---
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-style "fg=#9C9488,bg=#242019"

# left: session name pill
set -g status-left-length 30
set -g status-left "#[fg=#1A1714,bg=#7FA688,bold] #S #[fg=#7FA688,bg=#242019,nobold]"

# right: host + time
set -g status-right-length 50
set -g status-right "#[fg=#6B6560,bg=#242019] %H:%M #[fg=#6B6560]│#[fg=#9C9488] #h "

# --- window tabs ---
set -g window-status-format " #[fg=#6B6560]#I#[fg=#6B6560]:#{?window_zoomed_flag,Z ,}#W "
set -g window-status-current-format "#[fg=#242019,bg=#332E27] #[fg=#D4CEC6,bold]#I:#W#{?window_zoomed_flag, Z,} #[fg=#332E27,bg=#242019]"
set -g window-status-style "fg=#6B6560,bg=#242019"
set -g window-status-current-style "fg=#D4CEC6,bg=#332E27,bold"
set -g window-status-separator ""

# --- pane borders ---
set -g pane-border-style "fg=#332E27"
set -g pane-active-border-style "fg=#7FA688"

# --- messages & command line ---
set -g message-style "fg=#F0EBE1,bg=#2E2921"
set -g message-command-style "fg=#C4A882,bg=#2E2921"

# --- mode (copy/search) ---
set -g mode-style "fg=#1A1714,bg=#C4A882"

# --- clock ---
set -g clock-mode-colour "#7FA688"
set -g clock-mode-style 24
