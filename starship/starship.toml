format = """
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$python\
$conda\
$line_break\
$character"""

palette = "cuimhne"

[palettes.cuimhne]
bg      = "#1A1714"
fg      = "#F0EBE1"
subtle  = "#6B6560"
green   = "#7FA688"
gold    = "#C4A882"
sage    = "#A8B898"
terra   = "#C47A5A"
mist    = "#8FA89C"

[hostname]
style = "fg:sage"
format = "[@$hostname]($style)"

[directory]
style = "fg:gold bold"

[character]
success_symbol = "[❯](green)"
error_symbol   = "[❯](terra)"
vimcmd_symbol  = "[❮](green)"

[git_branch]
format = "[$branch]($style)"
style  = "fg:mist"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)]($style) ($ahead_behind$stashed)]($style)"
conflicted = "!"
untracked  = "?"
modified   = "●"
staged     = "+"
renamed    = "→"
deleted    = "✗"
stashed    = "≡"
ahead      = "↑"
behind     = "↓"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style  = "fg:gold"

[cmd_duration]
format = "[$duration]($style) "
style  = "fg:mist"

[python]
format = "[$virtualenv]($style) "
style  = "fg:green"

[conda]
format = "[$environment]($style) "
style  = "fg:sage"
